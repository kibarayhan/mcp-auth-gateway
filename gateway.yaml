# gateway.yaml — Configuration with auth, policies, audit, and rate limiting
gateway:
  listen: "localhost:3100"

auth:
  provider: apikey
  users:
    - key: "sk-eng-abc123"
      name: "akibar"
      roles: ["engineer"]
    - key: "sk-admin-xyz789"
      name: "admin-bot"
      roles: ["admin", "engineer"]

audit:
  destination: file
  path: "./logs/audit.jsonl"
  retention_days: 90

servers:
  - name: filesystem
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/private/tmp/mcp-gateway-test"]
    policies:
      allowed_roles: ["engineer", "admin"]
      rate_limit: "100/hour"
      pii_filter: true
      tools:
        write_file:
          allowed_roles: ["admin"]
        edit_file:
          allowed_roles: ["admin"]
      blocked_args:
        - pattern: "(?i)\\.env$"
        - pattern: "(?i)credentials"

  - name: aws-serverless
    command: "uvx"
    args: ["awslabs.aws-serverless-mcp-server@latest"]
    env:
      AWS_PROFILE: "dev"
    policies:
      allowed_roles: ["engineer", "admin"]
      rate_limit: "50/hour"
      pii_filter: true
      audit: verbose

  - name: firecrawl
    command: "npx"
    args: ["-y", "firecrawl-mcp"]
    env:
      FIRECRAWL_API_KEY: "${FIRECRAWL_API_KEY}"
    policies:
      allowed_roles: ["engineer", "admin"]
      rate_limit: "30/hour"
      pii_filter: true
      blocked_args:
        - pattern: "(?i)booking\\.com"
        - pattern: "(?i)booking\\.org"
        - pattern: "(?i)\\.booking\\."
        - pattern: "(?i)bkng\\."
        - pattern: "(?i)intranet\\."
        - pattern: "(?i)confluence\\.booking"
        - pattern: "(?i)gitlab\\.booking"
        - pattern: "(?i)jira\\.booking"
        - pattern: "(?i)alertapi\\.booking"
